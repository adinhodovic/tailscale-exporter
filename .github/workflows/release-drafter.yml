# yamllint disable rule:line-length rule:truthy
name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions: read-all

jobs:
  autolabeler:
    name: Update PR Labels
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter/autolabeler@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_draft:
    name: Update Release Draft
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      PUBLISH_DRAFT: false
    steps:
      - name: Check if a version is cut
        if: "contains(github.event.head_commit.message, 'chore(prerelease): Cut Version')"
        run: |
          echo "PUBLISH_DRAFT=true" >> $GITHUB_ENV

      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        with:
          publish: ${{ env.PUBLISH_DRAFT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
